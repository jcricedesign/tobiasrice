<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>TR Monogram Logo Animation</title>
	<style>
		body {
			background: #000;
			margin: 0;
			height: 100vh;
			display: flex;
			align-items: center;
			justify-content: center;
		}
		.logo-svg {
			opacity: 0;
			transform: scale(0.8);
			transition: opacity 1s ease, transform 1.2s cubic-bezier(.68,-0.55,.27,1.55);
		}
		.logo-svg.visible {
			opacity: 1;
			transform: scale(1);
		}
		.logo-svg g > * {
			stroke-dasharray: 1000;
			stroke-dashoffset: 1000;
		}
		.logo-svg.visible g > * {
			animation: draw 5s forwards;
		}
		.logo-svg.pulse {
			animation: pulse 3.5s ease-in-out infinite;
			filter: drop-shadow(0 0 12px #F2F2F2) drop-shadow(0 0 24px #F2F2F2);
		}
		@keyframes draw {
			to {
				stroke-dashoffset: 0;
			}
		}
		@keyframes pulse {
			0% {
				transform: scale(1);
				filter: drop-shadow(0 0 12px #F2F2F2) drop-shadow(0 0 24px #F2F2F2);
			}
			50% {
				transform: scale(1.04);
				filter: drop-shadow(0 0 20px #F2F2F2) drop-shadow(0 0 40px #F2F2F2);
			}
			100% {
				transform: scale(1);
				filter: drop-shadow(0 0 12px #F2F2F2) drop-shadow(0 0 24px #F2F2F2);
			}
		}
	</style>
</head>
<body>
	<svg class="logo-svg" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024" role="img" aria-label="TR circular monogram logo">
		<!-- Transparent background: removed rect -->
		<g fill="none" stroke="#F2F2F2" stroke-linecap="square" stroke-linejoin="round">
			<circle cx="512" cy="505" r="193" stroke-width="8"/>
			<circle cx="512" cy="505" r="118" stroke-width="8"/>

			<!-- T -->
			<path d="M 427 430 L 510 430" stroke-width="8"/>
			<path d="M 478 430 L 478 582" stroke-width="8"/>

			<!-- R -->
			<path d="M 508 430 L 508 582" stroke-width="8"/>
			<path d="M 508 430 L 550 430" stroke-width="8"/>
			<path d="M 550 430
							 C 574 430, 592 448, 592 471
							 C 592 494, 574 512, 550 512
							 L 508 512" stroke-width="8"/>
			<path d="M 548 512 L 591 580" stroke-width="8"/>
		</g>
	</svg>
	<script>
		window.addEventListener('DOMContentLoaded', () => {
			const svg = document.querySelector('.logo-svg');
			setTimeout(() => {
				svg.classList.add('visible');
				// Wait for the draw animation to finish (5s)
				setTimeout(() => {
					svg.classList.add('pulse');
				}, 5000);
			}, 300);
		});
	</script>
</body>
</html>
